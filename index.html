<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai IME - GitHub Pages</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Thai Transliteration IME</h2>
    <textarea id="input" placeholder="Nhấn các phím k, s, c, t, p..."></textarea>
    
    <div class="guide">
        <strong>Hướng dẫn:</strong> Gõ liên tiếp một phím để xoay vòng các ký tự tương ứng.<br>
        Ví dụ: Gõ <code>k</code> → ข, gõ tiếp <code>k</code> lần nữa → ฃ...
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
